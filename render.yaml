databases:
  - name: spendwise-db
    plan: free
    databaseName: spendwise
    user: spendwise

services:
  - type: web
    name: spendwise
    plan: free
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spendwise-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
